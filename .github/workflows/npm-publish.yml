name: Publish package

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build --if-present
      - name: Bump version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version
          node -e "
            const fs = require('fs');
            const p = '.codex-plugin/plugin.json';
            const plugin = JSON.parse(fs.readFileSync(p, 'utf8'));
            plugin.version = '$VERSION';
            fs.writeFileSync(p, JSON.stringify(plugin, null, 2) + '\n');
          "
      - run: npm pack --dry-run
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json .codex-plugin/plugin.json
          git commit -m "chore: bump version to ${GITHUB_REF_NAME#v}"
          git push origin HEAD:main
